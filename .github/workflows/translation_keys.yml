name: Translation keys

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  build:
    if: github.repository_owner == 'gristlabs' || github.repository_owner == 'paulfitz'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0 # Let's get all the branches

      - name: Use Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 22

      - name: Install Node.js packages
        run: yarn install

      - name: Build code
        run: yarn run build

      - name: Scan for keys
        id: scan-keys
        run: |
          git checkout -b translation-keys
          yarn run generate:translation 2>&1 | tee /tmp/scan-output.txt
          git status --porcelain
          if [[ $(git status --porcelain | wc -l) -eq "0" ]]; then
            echo "No changes"
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            echo "Changes detected"
            echo "CHANGED=true" >> $GITHUB_ENV
          fi

      - name: setup git config
        run: |
          git config user.name "Paul's Grist Bot"
          git config user.email "<paul+bot@getgrist.com>"

      - name: Create PR and merge
        if: env.CHANGED == 'true'
        run: |
          git commit -m "automated update to translation keys" -a
          git push --set-upstream origin HEAD:translation-keys -f
          num=$(gh pr list --search "automated update to translation keys" --json number -q ".[].number")
          if [[ "$num" != "" ]]; then
            echo "Existing translation keys PR #$num is open, skipping"
            exit 0
          fi
          body=$(grep -E "Merging key|merge\(s\)" /tmp/scan-output.txt | head -20)
          gh pr create --title "automated update to translation keys" --body "$body"
          gh pr merge --merge --delete-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
